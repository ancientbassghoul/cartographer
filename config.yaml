# Cartographer unified config. Paths are relative to the cartographer/ repo root.
# The simulator lives in the sibling folder ../XLAB/ and is treated as read-only.

simulator:
  root: "../XLAB"                       # black-box Unity sim (read-only)
  reference_script: "../XLAB/Sample_Drone_Interface.py"
  recordings_dir: "../XLAB/OUTPUT"      # existing flight .mp4s (1280x720 @ 30fps)

network:
  unity_server_ip: "127.0.0.1"          # io_bridge is the TCP SERVER; Unity connects in
  unity_control_port: 65432
  ndi_source_name: "Unity"              # substring filter; dynamic discovery stays primary
  # localhost message bus between our own processes (io_bridge -> perception/object workers)
  frame_bus_port: 5601                  # ZeroMQ PUB/SUB for downscaled ML frames
  state_bus_port: 5602                  # io_bridge -> UI: status heartbeat + detect requests
  # Each PUB binds its own port (frame_bus convention); subscribers connect to all they need.
  perception_state_port: 5603           # perception_worker -> UI/map: depth, obstacle bar, poses
  object_state_port: 5604               # object_worker -> UI/report: target detections (bbox/center)
  frame_bus_hires_port: 5605            # io_bridge -> object_worker: high-res frames for Qwen grounding
  autonomy_control_port: 5606           # autopilot (P5) -> io_bridge: TOPIC_CONTROL desired control fields

perception:
  target_processing_fps: 10             # sub-sample 30 -> 10 into the GPU workers
  processing_width: 512                 # transport resolution; 16:9 preserved (NEVER squash)
  processing_height: 288
  # (depth_cadence_hz REMOVED 2026-07-07 — DA-V2 depth disabled; SLAM owns the GPU alone.)
  object_cadence_hz: 0.5                 # Qwen target detection (separate process); slow, start conservative
  object_frame_height: 720               # hi-res frame height for Qwen grounding (width keeps aspect; no upscale beyond source)
  capture_key: "space"                   # io_bridge: grab the current FULL-RES drone frame -> capture_dir (benchmark frames)
  capture_dir: "test_assets/captures"    # where 'space' snapshots are written (full-res PNG; sort into Nasrallah/Rifle/None)

models:
  # (depth_anything REMOVED 2026-07-07 — DA-V2 depth inference disabled; the wall stand-off uses the SLAM raycast.)
  owlv2:                                # OWLv2 image-guided (cascade verifier + standalone OWLV2 mode)
    hf_id: "google/owlv2-base-patch16-ensemble"  # image-guided one-shot detection
    score_thresh: 0.9                   # standalone OWLV2 mode: top box >= this (scores NOT calibrated)
    nms_thresh: 0.3                     # NMS IoU for post_process_image_guided_detection
    verify_thresh: 5.0                  # CASCADE gate: accept Qwen's crop iff abs image-guided logit >= this
                                        #   (dev poster ~7, murals/sign ~3.7; tune on the offline run)
  qwen_vl:
    hf_id: "Qwen/Qwen2.5-VL-3B-Instruct"
    quantization: "4bit"                # bitsandbytes nf4
    object_trigger_key: "g"             # NOTE: 'f'=descend, 'o'=autopilot demo are taken
    reference_crop: "test_assets/target_dev.png"  # PROVIDED ASSET: the Phase-1 target reference crop
    target_label: null                  # optional text label; if null, derived from the crop at startup
    max_new_tokens: 256                 # bbox JSON is short; cap generation for latency
  mast3r_slam:
    repo_dir: "third_party/MASt3R-SLAM" # native Windows branch build
    checkpoints_dir: "third_party/MASt3R-SLAM/checkpoints"

map:
  voxel_size: 0.05                      # 5 cm occupancy voxels (consistent units, metric NOT required)
  glass_stall_seconds: 1.5              # forward-commanded + SLAM translation ~0 => virtual wall
  drone_clearance_m: 0.30               # opening passability threshold

# Phase-2 autonomy. GENERAL, SELF-CALIBRATING params ONLY — NO value here may encode the answer for a
# specific room/flight (see CLAUDE.md "CRITICAL AUTONOMY STANDARD"). These are durations / ratios /
# noise floors tuned to physics + robustness; the ceiling altitude itself is measured LIVE per flight.
autonomy:
  enable_key: "m"                # io_bridge: toggle autonomy ON/OFF (any manual flight key aborts to manual)
  ascend_cmd: -1                 # joy_vertical value for "rise" (camera Y is DOWN, so up = -1; matches io_bridge joy_up)
  cmd_timeout_s: 0.5             # io_bridge zeroes autonomous controls if no fresh command within this window
  # Maneuver recipes (arm pulse, turn unit, back-off, reset-attitude) live in flight_playbook.json.
  # Optical-flow contact detector (flow_contact_detector.py) — replaces the SLAM-pose ceiling detector.
  # GENERAL, SELF-CALIBRATING only: ratios + durations + noise floors on a fixed working resolution.
  # NO value encodes this room (ceiling altitude / distance-to-wall / a frame index). See CLAUDE.md.
  flow:
    flow_long_side: 320          # normalize each frame to this long side before Farneback (resolution-independent + fast)
    stall_frac: 0.15             # CONTACT when the flow signal < this fraction of the LIVE per-command reference (scale-free)
    dy_noise_floor: 0.05         # |dy_med| (px on working res) below this counts as "vertically stopped" (ceiling contact)
    exp_noise_floor: 0.05        # expansion below this counts as "no forward progress" (wall contact)
    contact_seconds: 0.8         # the collapse must hold continuously this long before declaring CONTACT
    arm_blank_s: 0.4             # onset blanking: suppress the collapse test this long after a push starts (accel dead-zone)
  # Map mode (frontier exploration). GENERAL platform/robustness params ONLY — NO value encodes this
  # room's geometry (the occupancy grid + frontiers are built LIVE from SLAM; see CLAUDE.md + ground_grid.py).
  # Lengths are in SLAM units (metric scale NOT recovered — internal consistency is what matters).
  explore:
    # --- GroundGrid (2D X-Z log-odds free/unknown/occupied; ground_grid.py) ---
    ground_cell_size: 0.10       # ground cell edge (SLAM units); coarser than the 5cm voxel map (planning, not rendering)
    height_band_frac: 0.20       # keep world points within +/- this fraction of the per-keyframe vertical span around the LIVE camera Y (wall slice; floor/ceiling out)
    logodds_hit: 0.85            # occupied evidence added at a ray endpoint
    logodds_miss: 0.40           # free evidence subtracted along a carved ray (one clean carve => FREE)
    logodds_clamp: 4.0           # |log-odds| ceiling (keeps a cell revisable, not saturated)
    free_thresh: -0.3            # log-odds <= this => FREE
    occ_thresh: 0.4              # log-odds >= this => OCC
    min_frontier_cells: 6        # drop frontier clusters smaller than this (noise)
    obstacle_inflation: 2        # dilate OCC by this many cells (drone-clearance margin); frontier cells inside are dropped
    # --- planner / goal selection (frontier_planner.py) ---
    # Frontier UTILITY = size * max(goal_behind_floor, cos(turn)) / (1 + goal_dist_weight*dist): prefer BIG,
    # AHEAD, NEAR frontiers (a frontier behind the drone is floored low, so it's a last resort -> no
    # behind-me flips). STRONG COMMITMENT keeps the chosen goal until reached/gone or clearly beaten, so it
    # stops abandoning a good far goal. General planner params (the map/frontiers are LIVE; HARD RULE).
    goal_reach_dist: 1.0         # a goal is "reached" when the drone is within this distance of it (X-Z)
                                 #   (eased 0.4->1.0 in session 8: stop approaching a goal ~1 SLAM-unit out so the
                                 #   FOV doesn't fill entirely with unclear wall texture -> fewer futile wall rams)
    replan_period_s: 0.5         # how often perception republishes TOPIC_PLAN
    goal_dist_weight: 0.5        # distance penalty in the frontier utility (higher = prefer nearer frontiers)
    goal_behind_floor: 0.15      # utility multiplier floor for a frontier behind the drone (cos(turn) floored to this)
    goal_switch_factor: 1.5      # only abandon the committed goal if another frontier's utility beats it by this factor
    goal_assoc_dist: 1.0         # associate the committed goal with a live frontier centroid within this (SLAM units)
    # --- unreachable-goal EVENT-DRIVEN 2-BUMP blacklist: there is NO path planner (the drone flies a STRAIGHT
    #     line to the goal bearing), so a goal behind an invisible GLASS collider (a treadmill) OR behind an
    #     opaque wall is never reachable -> an endless loop. We do NOT time-accumulate stagnation (a prior
    #     watchdog gated its clock on SLAM-healthy frames and so went BLIND exactly in the heavy glass/wall
    #     pockets where SLAM runs hot yet the drone still flies on valid poses). Instead the autopilot reports
    #     each DISCRETE advance-blocked stop (flow WALL / ram-guard / clearance stand-off) as a "bump" pulse
    #     (TOPIC_AUTOPILOT_EVENT); TWO bumps on the SAME goal region (within goal_assoc_dist) PERMANENTLY
    #     blacklist it. Event-driven, so it is immune to SLAM-clock health. A kinematic latch in the autopilot
    #     (re-arm on a reverse command OR displacement > goal_reach_dist) makes one continuous contact = one
    #     bump. The 2-bump threshold is a hardcoded constant (no knob); LIVE-computed points, no room geometry.
    goal_progress_eps: 0.2       # min closing distance (SLAM units) counted as progress; the round-blacklist
                                 #   soft-vs-PERMANENT promotion test. Keep DEFINITIVE (>= ~0.05).
    goal_blacklist_radius: 1.0   # a frontier within this of a dead goal is "the same" region (defaults to goal_assoc_dist)
    # Map-validated clearance buffer: a chosen frontier goal (which sits on the FREE/unobserved boundary)
    # can hug an obstacle/corner and stall the drone; the planner pulls it back along the drone->goal axis
    # to a FREE cell with this much clearance (SLAM units) before committing. General stand-off scale
    # (~one obstacle_inflation ring = obstacle_inflation * ground_cell_size), validated against the LIVE
    # map every replan — NOT a room answer. Publishes goal_clearance_ok=false (visible) if no FREE buffered
    # cell exists on the segment (NO SILENT FALLBACK: it commits the raw goal but flags it).
    goal_clearance_buffer: 0.2
    # --- done verification / reposition via DIAGONAL SWEEP: when NO frontier is reachable, fly ONCE to the
    #     opposite corner of the known bounding box (ground_grid.sweep_corner) -- a deterministic full-room
    #     traverse that re-scans for uncharted territory before declaring done AND relocates to a fresh
    #     vantage when every goal is blacklisted (on arrival the round's soft blacklist clears so goals get
    #     one retry). The corner is cached ONCE as a static target -> no oscillation. Replaces the old
    #     fragile farthest-free / verify_min_dist "too near" gate that could silently return no goal. ---
    verify_done: true            # enable the diagonal-sweep done-verification / reposition trip
    reposition_inset: 1.2        # inset the sweep corner inward from the bbox edge by this (SLAM units) so it is
                                 #   REACHABLE (general stand-off scale, NOT a room answer). MUST sit in the reachable
                                 #   band stop_clearance_dist <= inset <= stop_clearance_dist + goal_reach_dist (with
                                 #   session-8 values [1.00, 2.00]): below it, the drone hits its wall stand-off
                                 #   before reaching the target; above it, the target is short of the corner.
                                 #   Perception clamps + warns. A bbox axis narrower than 2*inset targets that
                                 #   axis's midpoint instead (ground_grid.sweep_corner), so corridors don't overshoot.
    no_goal_idle_s: 12.0         # REPLAN idle backstop: if the planner returns no goal AND not done for longer than
                                 #   this (only a startup transient with the sweep planner), raise a VISIBLE log +
                                 #   telemetry flag instead of idling dark forever (NO SILENT FALLBACK). General
                                 #   robustness timeout, NOT a room answer.
    # --- forward clearance (raycast stand-off; primary forward stop) ---
    # Perception casts a small FAN of ground-plane rays into the voxel map it built (along the LIVE
    # heading) and publishes the nearest hit distance as TOPIC_PLAN forward_clearance_dist; the autopilot
    # stops the ADVANCE leg before ramming a wall (a head-on ram freezes the image -> monocular SLAM dies).
    # General stand-off margin (like goal_reach_dist / map.drone_clearance_m), NOT a room answer: the wall
    # position is mapped LIVE; we only hold a fixed clearance. Distances in SLAM units (scale not recovered).
    stop_on_clearance: true      # enable the raycast stand-off stop (flow contact stays as the glass/unmapped fallback)
    clearance_fan_deg: 15.0      # cast rays across +/- this half-angle around forward (off-center walls / sparse voxels)
    clearance_fan_n: 3           # rays in the fan (odd -> includes the center ray)
    clearance_skip: 0.25         # ignore mapped points within this of the camera (matches the target-lift skip)
    clearance_min_count: 2       # a voxel needs >= this many observations to count as a wall (ignore single-hit noise)
    clearance_max_range: 10.0    # cap the ray length (SLAM units); beyond this is treated as "open"
    stop_clearance_dist: 1.0     # STOP the leg when the nearest forward hit is within this (SLAM units; general stand-off, TUNABLE live)
                                 #   (raised 0.6->1.0 in session 8: stop before the wall fills the FOV -> keeps SLAM richer)
    backoff_on_standoff: true    # after a clearance stand-off stop, play the small back_off recipe (reverse pulse) before
                                 #   settling: it re-arms the 2-bump latch so a stand-off pin can still blacklist an
                                 #   unreachable wall (Bug B) + seeds SLAM parallax. false = direct settle (old behavior).
    # NOTE: the settle pause between maneuvers/legs is rules.rest_between_s in flight_playbook.json (tune it there).
    # --- prelude (autopilot: arm -> takeoff -> [TWO-PHASE ascend to ceiling -> descend -> baseline nudge] -> explore) ---
    ascend_to_ceiling: true      # after takeoff, climb until the flow CEILING fires, then drop a bit, so mapping runs at a consistent height near the ceiling
    ascend_max_s: 25.0           # SAFETY: stop ascending after this even if no ceiling latches, then proceed (general, not a room answer)
    # TWO-PHASE HYBRID ASCENT (gentle, SLAM-metered): a long continuous climb builds too much vertical momentum
    # and smashes SLAM at the ceiling. Phase 1 = short UP micro-pulses (joy_vertical is a DISCRETE -1/0/+1 axis
    # so "gradual" = keystroke pulses, not a throttle); after each rest read the live SLAM altitude gain
    # dZ = prev_pos_y - cur_pos_y (+Y is DOWN, so RISING => pos_y DECREASES) and keep pulsing while dZ > eps.
    # Phase 2 = once the gain flattens (dZ <= eps for stall_cycles), hold UP continuously long enough to latch
    # the flow CEILING detector cleanly at near-zero velocity. All general platform params (durations + a
    # per-step gain floor), NOT a room answer -> leakage-safe.
    ascend_micro_pulse_s: 0.1    # Phase-1: duration of ONE UP micro-pulse (bounded keystroke, near-zero momentum)
    ascend_rest_s: 1.0           # Phase-1: rest after each pulse (momentum bleed + a clean pose to read dZ)
    ascend_gain_eps: 0.05        # per-cycle altitude-gain noise floor (SLAM units); dZ <= this counts as "not climbing"
    ascend_stall_cycles: 2       # consecutive flat-gain cycles that confirm the ceiling (rejects a 1-frame SLAM hiccup)
    ascend_latch_hold_s: 2.0     # Phase-2: continuous UP hold; MUST exceed the detector's arm_blank_s + contact_seconds (~1.2s) to latch
    # NOTE: the post-ceiling descent is the "descend" recipe in flight_playbook.json — tune its key-press duration there.
    # Baseline nudge: after the descend, a one-shot horizontal translation to seed a SLAM translational baseline
    # (parallax) BEFORE the first exploration yaw (pure rotation is the SLAM-killer). Reuses the parallax ring-pick.
    baseline_nudge_dist: 0.4     # translate this far to seed parallax (SLAM units)
    baseline_nudge_max_s: 2.0    # SAFETY time cap on the baseline nudge
    # Per-goal HEIGHT RE-CALIBRATION (item 1 + session-11 STATE-GATED fix): on a GENUINE goal change, re-run the
    # two-phase ascend->descend, then JUDGE THE RESULT AFTER IT ENDS (CALIB_VERIFY) against a continuous rolling
    # baseline of NORMAL flying altitude (frozen during any calibration). A settled height significantly below the
    # baseline median => the calibration SANK the drone (poisoning the live-camera-Y occupancy slab) => climb to
    # clean airspace (ASCEND_ESCAPE) -> slide 1u (CALIB_TRANSLATE) -> retry. All GENERAL / LIVE-relative params
    # (margins vs the LIVE median, a settle window, a 1u displacement) -> no room-answer leak.
    calibrate_on_goal_change: true   # enable CALIBRATING_HEIGHT on a genuine goal change (needs ascend_to_ceiling)
    calib_cooldown_s: 60.0           # min seconds between ceiling taps (also skips the first post-prelude goal)
    calib_goal_change_dist: 1.0      # the goal must move MORE than this (SLAM units) to trigger a re-tap
    calib_max_retries: 2             # climb+translate+re-run attempts per calibration before abandoning (logged)
    # --- session-11 state-gated verification (CALIB_VERIFY + ASCEND_ESCAPE + CALIB_TRANSLATE) ---
    mapping_alt_history_len: 200     # rolling baseline length: samples of NORMAL flying altitude (frozen during calib)
    calib_min_baseline_samples: 10   # need >= this many baseline samples before CALIB_VERIFY can judge (else PASS)
    calib_settle_gate_s: 1.0         # CALIB_VERIFY holds until a frame CAPTURED >= this after DESCEND issued (dynamics settle)
    calib_low_height_margin: 0.3     # settled pos_y > median + this (+Y DOWN => lower) = a SANK calibration => FAIL
    calib_verify_max_s: 5.0          # SAFETY: cap the settle-and-judge; persistent 'higher than median' => PASS (logged)
    calib_retry_translate_dist: 1.0  # CALIB_TRANSLATE: clean horizontal slide (SLAM units) in high airspace before re-run
    # --- POST-MISSION FLOOR-DOCK POSTLUDE (when the all-corners tour is exhausted, planner done=True):
    #     RETURN_TO_ORIGIN -> DOCK_FLOOR (gentle PULSED descent) -> LOW_STANDOFF -> DONE. Instead of a
    #     static hover at mapping height, fly home to the take-off origin (SLAM-frame [0,0]), descend
    #     GENTLY to the floor, nudge up to a low stand-off, then stand by. All GENERAL platform/robustness
    #     params (the origin is the SLAM [0,0]; the floor is detected LIVE by the flow FLOOR collapse) —
    #     NOT a room answer. A continuous hold-down is FORBIDDEN (rapid downward accel chokes SLAM), so the
    #     descent MIRRORS the two-phase ascent: DOWN micro-pulses metered by the SLAM descent gain, then a
    #     continuous latch hold to catch a clean FLOOR. FLOOR detection is NEW/unvalidated -> dock_max_s caps it. ---
    home_reach_dist: 1.0             # "reached the origin" test (SLAM units; defaults to goal_reach_dist)
    home_max_s: 30.0                 # SAFETY: cap the homing; then dock HERE (logged, NO SILENT FALLBACK)
    dock_pulse_s: 0.1               # Phase-1: DOWN micro-pulse length (near-zero momentum; mirrors ascend_micro_pulse_s)
    dock_rest_s: 1.0                # Phase-1: rest after each DOWN pulse (momentum bleed + a clean pose to read dZ)
    dock_max_s: 20.0                 # SAFETY: cap the descent even if no FLOOR latches, then proceed (logged)
    floor_standoff_nudge: 0.5        # LOW_STANDOFF: UP-nudge duration (s) to clear the ground before standby
    # (the descent reuses the ascend gain/stall/latch knobs: ascend_gain_eps / ascend_stall_cycles / ascend_latch_hold_s)
    # --- executor (autopilot run_explore) ---
    # The engine is a "fly toward your aim" scheme: yaw moves an aim crosshair, forward thrust flies
    # toward it, and a sustained yaw HOLD (then 'c' reset) rotates the body. A turn's ANGLE = how long
    # yaw is held -> we turn OPEN-LOOP in quantized steps using the user-calibrated playbook turn recipe
    # (its yaw-hold = turn_recipe_deg), scaling the hold per step. The per-leg re-plan after each ADVANCE
    # is the outer correction loop. NO pulsing, NO closed-loop on SLAM heading. See FOLLOW-UP FIX #2.
    # EXPERIMENT (reverse-probe): a big open-loop turn breaks MASt3R-SLAM (RELOC freezes the pose); straight
    # translation should keep it TRACKING. When ON: cap each leg's turn to ONE turn_step_deg (<=45 -> SLAM
    # still alive at the wall) and, on WALL, fly straight BACKWARD (camera still facing the wall, sees
    # familiar features) instead of the tiny back-off, to test whether reverse keeps SLAM alive. General
    # platform behavior, NOT a room answer (the reverse DURATION lives in flight_playbook.json reverse_probe).
    reverse_probe_on_wall: true  # FALLBACK action on a flow WALL hit (glass/unmapped): SETTLE -> REVERSE_PROBE -> SETTLE -> REPLAN
    clamp_leg_turn: true         # cap each leg's turn to ONE turn_step (<=45 deg) -> SLAM survives the turn (proven live); per-leg replan corrects
    forward_throttle: 0.2        # forward trigger (0-1) for ADVANCE + forward parallax pushes; lower = slower
                                 # approach so SLAM maps the wall before impact and the clearance stop can fire.
                                 # Platform control magnitude (like the playbook's 0.55 cruise), NOT a room answer.
                                 # 0.1 is a deliberately extreme first value to confirm the knob bites (may barely move).
    reverse_throttle: 0.2        # reverse (0-1) for ALL backward maneuvers (back_off, reverse_probe, recovery
                                 # back-off, backward parallax push); overrides the playbook's 0.7. Lower = gentler
                                 # retreat so a fast backward ram can't throw the drone to SLAM-killing angles.
                                 # Continuous throttle like forward (manual 's' ramps it the same way); general magnitude.
    turn_step_deg: 45.0          # quantize each aim change to this (45 -> 8 headings; 90 -> exact recipe only)
    turn_recipe_deg: 90.0        # the angle the playbook turn_left/right recipe produces (platform constant the user calibrated)
    leg_max_s: 20.0              # SAFETY: cap a single ADVANCE leg (then back off + replan)
    plan_timeout_s: 3.0          # NO SILENT FALLBACK: if no TOPIC_PLAN arrives within this window (perception dead) while airborne, HOLD
    # --- SLAM-loss recovery (CONTROL-SPACE; pose is invalid during a tracking loss, so recovery replays
    #     inverse COMMANDS, not a fly-to-pose). PLAN-LOST (perception silent) = hard hover-hold indefinitely
    #     (no time-based escalation). PLAN-STALE = RECOVERY_REWIND: replay the inverse of the last
    #     command_history_s of maneuvers to re-expose keyframes, watching for OK; empty/exhausted history ->
    #     parallax + <=45deg fallback. General platform params; nothing here is this room's geometry. ---
    command_history_s: 12.0      # rewind horizon: retrace ~this many seconds of recent maneuvers (inverse replay)
    fallback_retreat_s: 0.5      # translate this long toward the roomier axis per fallback attempt (parallax + <=45 turn)
    fallback_max_attempts: 16    # unidirectional +45deg sweep attempts (16 = >360deg full re-expose) before STUCK (HOLD until perception recovers)
    # --- SLAM frame-timing settle gate. A healthy MASt3R-SLAM solve on this GPU builds a frame in well under
    #     a second; a choke (esp. right after a turn) spikes it and the emitted pose is unreliable. While
    #     translating / just after a turn / on recovering, HOLD until the solve settles, then fly. These are
    #     COMPUTE characteristics (tunable), NOT this room's geometry. ---
    slam_slow_ms: 1000.0         # a frame build >= this = SLAM choking -> stop moving and hold
    slam_settle_frames: 6        # "stable" only after >5 consecutive FRESH frames each built under slam_slow_ms
                                 #   (raised 3->6 in session 8 to give SLAM more margin before resuming flight)
    # SLAM-settle REWIND step-back: if SLAM stays slow in a HOLD (plan still OK), stepping one entry back
    # through the rewind queue re-exposes known-good geometry to help the solve re-lock (the user's
    # "back up until it settles" idea). Re-arm needs another full run of slow frames; capped per hold.
    slam_stepback_after_frames: 10   # consecutive slow FRESH frames in a HOLD before a rewind step-back
    slam_stepback_max_steps: 3       # max step-backs per SLAM_HOLD (then just keep holding)
    # --- altitude lock (hold the LIVE-cached mapping height; counters the forward-push sink that drifts the
    #     drone into inner walls). target altitude is cached LIVE from this flight's pose (self-calibrating,
    #     NOT a baked room value); the floor/threshold are general margins. World frame is +Y DOWN. ---
    altitude_lock: true          # actively hold altitude during ADVANCE using the live SLAM Y (TOPIC_PLAN pos_y)
    alt_drift_floor: 0.3         # only correct once sunk MORE than this below the cached target (SLAM units; deadband, anti-chatter)
    # (Depth inner-wall bump-up REMOVED 2026-07-07 — the sim can't crash, so the depth-map height patches are
    #  gone. DA-V2 depth is disabled entirely to free the GPU SLAM shares. Altitude is held only by the
    #  SLAM-pose altitude lock above + re-tapped at the ceiling by the two-phase ascent.)
    # --- ram guard: "forward-commanded but the SLAM pos isn't advancing toward the goal" = riding an invisible
    #     collider (the forward-clearance ray can't stop it -- None when SLAM flickers, and it rises with the
    #     drone as it climbs the wall; the flow WALL needs a looming COLLAPSE that never comes on a slow ram).
    #     Detect it in POS space and STOP the leg before the ram kills SLAM; a repeated re-commit then hits the
    #     goal_stagnation_s blacklist. General robustness params, not room geometry. ---
    ram_stall_s: 3.0             # forward-advancing seconds with NO leg-distance progress before the leg is stopped
    ram_progress_eps: 0.15       # min leg-distance improvement (SLAM units) that counts as advancing (resets the ram timer)
    # --- parallax scouting (a goal needing MORE than one turn_step is reached as turn -> short translate
    #     (forward/back, whichever the rays say is roomier) -> settle -> turn again -> ... -> aim -> advance.
    #     The translation between rotations gives SLAM the parallax it needs to survive a multi-step turn,
    #     and keeps the drone roughly in place instead of advancing off-goal into inner walls. All decisions
    #     from LIVE raycast clearance / SLAM pose; general margins only — no room answer. ---
    parallax_scout: true         # enable turn<->push<->turn for goals more than one turn_step away
    parallax_push_dist: 0.5      # push until the SLAM pose has translated this far (SLAM units) -> "a few units" of parallax
    parallax_pad: 0.4            # only push into a body axis whose clearance > stop_clearance_dist + this (else skip; just turn)
    parallax_push_throttle: 0.4  # FORWARD push magnitude, DECOUPLED from the 0.1 ADVANCE crawl (which gave ~no parallax);
                                 #   the push is short + clearance-guarded so it can be brisk. Backward stays on reverse_throttle.
    parallax_push_s: 2.0         # SAFETY time cap on a push (raised so DISTANCE, not the timer, ends the push at the new throttle)
    parallax_max_pushes: 8       # cap consecutive pushes per leg (anti-deadlock; a 180-deg goal needs ~4 at 45-deg steps)

runtime:
